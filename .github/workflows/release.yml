name: Auto Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 打包项目文件
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          [ "$TAG_NAME" == "$GITHUB_REF" ] && TAG_NAME="latest"
          ZIP_NAME="Wenfxl-Codex-Manager-${TAG_NAME}.zip"

          zip -r $ZIP_NAME . \
            -x "*.git*" -x "*.github*" -x "*__pycache__*" \
            -x "data/*" -x "config.yaml" -x "*.env" \
            -x "venv/*" -x ".idea/*" -x ".vscode/*"

          echo "ZIP_FILE=$ZIP_NAME" >> $GITHUB_ENV

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_FILE }}
          name: "Wenfxl Codex Manager ${{ github.ref_name }}"
          target_commitish: main
          body: |
            欢迎使用最新版本！详细变更请见下方日志。

            ---
            📦 **资源文件**: `${{ env.ZIP_FILE }}`
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}